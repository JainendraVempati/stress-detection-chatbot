version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# Stress Detection Chatbot — Docker Compose
#
# Services:
#   ml-service — Python Flask + DistilBERT + VADER (port 5000)
#   backend    — Node.js Express API (port 4000)
#   frontend   — Nginx static file server (port 80)
#
# Database:
#   MongoDB Atlas (cloud) — NOT a local container.
#   Set MONGO_URI in your .env file to your Atlas connection string.
#   Get it from: https://cloud.mongodb.com/
#
# LLM Chain (configured via environment variables):
#   Gemini 2.0 Flash (primary, fast, free tier)
#     → NVIDIA NIM Llama 3.1 70B (fallback)
#       → Offline template responses (last resort)
#
# Usage:
#   1. Copy .env.example to .env and fill in all values (especially MONGO_URI)
#   2. Place ml_service/stress_model.pt and ml_service/tokenizer.pkl
#   3. Run: docker-compose up --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Python ML Microservice (DistilBERT + VADER) ───────────────────────────
  ml-service:
    build:
      context: .
      dockerfile: Dockerfile.ml
    container_name: stress_detection_ml
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      # NVIDIA NIM — used inside ml_service.py for LLM fallback
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      NVIDIA_MODEL: ${NVIDIA_MODEL:-meta/llama-3.1-70b-instruct}
    networks:
      - stress-network
    restart: unless-stopped
    healthcheck:
      test: curl -f http://localhost:5000/health || exit 1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 300s    # DistilBERT model load can take a few minutes

  # ── Node.js Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: "./Stress Detection/backend"
      dockerfile: Dockerfile
    container_name: stress_detection_backend
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      # ── MongoDB Atlas (cloud) ─────────────────────────────────────────────
      # Must be set in .env — format:
      # mongodb+srv://<user>:<pass>@cluster0.xxxxx.mongodb.net/stress_detection_db?retryWrites=true&w=majority
      MONGO_URI: ${MONGO_URI}
      # ML microservice URL (uses service name 'ml-service')
      ML_SERVICE_URL: http://ml-service:5000
      # JWT
      JWT_SECRET: ${JWT_SECRET:-super_secret_key_change_in_production}
      # Email (Gmail SMTP for OTP)
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_SECURE: ${EMAIL_SECURE:-false}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_FROM: ${EMAIL_FROM:-"StressBot <noreply@stressbot.app>"}
      # ── LLM API Keys ──────────────────────────────────────────────────────
      # Gemini 2.0 Flash — PRIMARY (free, fast ~1-2s)
      # Get key: https://aistudio.google.com/app/apikey
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      # NVIDIA NIM (Llama 3.1 70B) — FALLBACK
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      NVIDIA_MODEL: ${NVIDIA_MODEL:-meta/llama-3.1-70b-instruct}
    depends_on:
      ml-service:
        condition: service_healthy
    networks:
      - stress-network
    restart: unless-stopped

  # ── Frontend (Nginx) ────────────────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: stress_detection_frontend
    ports:
      - "80:80"
    volumes:
      - "./Stress Detection/frontend:/usr/share/nginx/html:ro"
      - "./nginx.conf:/etc/nginx/nginx.conf:ro"
    depends_on:
      - backend
    networks:
      - stress-network
    restart: unless-stopped

networks:
  stress-network:
    driver: bridge
